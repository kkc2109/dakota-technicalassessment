energy_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'dakota_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'change_me') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'energy_analytics') }}"
      schema: staging
      threads: 4
      keepalives_idle: 0
      connect_timeout: 30
