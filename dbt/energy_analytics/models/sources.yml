version: 2

sources:
  - name: raw
    description: >
      Bronze layer — raw ingested data in the `raw` schema.
      All tables are append-only and immutable. Never modified after insert.
    schema: raw
    tables:
      - name: eia_electricity_generation
        description: >
          Raw EIA API v2 electricity generation data by fuel source and state.
          Monthly frequency. Loaded daily via Dagster eia_electricity_generation asset.
        columns:
          - name: id
            description: Surrogate primary key.
            tests:
              - unique
              - not_null
          - name: period
            description: "EIA reporting period in YYYY-MM format (e.g. '2024-01')."
            tests:
              - not_null
          - name: state_code
            description: Two-letter US state code.
            tests:
              - not_null
          - name: fuel_type_code
            description: EIA fuel type identifier (e.g. NG, COL, NUC).
            tests:
              - not_null
          - name: generation_mwh
            description: Net electricity generation in thousand megawatthours.
          - name: ingested_at
            description: Pipeline ingestion timestamp (UTC).
            tests:
              - not_null

      - name: eia_electricity_prices
        description: >
          Raw EIA API v2 retail electricity prices by sector and state.
          Monthly frequency. Loaded daily via Dagster eia_electricity_prices asset.
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: period
            tests:
              - not_null
          - name: state_code
            tests:
              - not_null
          - name: sector_id
            description: Sector identifier (RES, COM, IND, ALL).
            tests:
              - not_null
              - accepted_values:
                  values: ["RES", "COM", "IND", "TRA", "ALL", "OTH"]
          - name: ingested_at
            tests:
              - not_null

      - name: enrichment_weather
        description: >
          Synthetic weather conditions per US grid region.
          Generated by the Dakota FastAPI enrichment service.
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: region
            tests:
              - not_null
          - name: temperature_c
            description: Temperature in degrees Celsius.
          - name: wind_speed_ms
            description: Wind speed in metres per second.
          - name: solar_irradiance_wm2
            description: Solar irradiance in W/m².
          - name: recorded_at
            tests:
              - not_null

      - name: enrichment_carbon_intensity
        description: >
          Synthetic carbon intensity data by fuel type and region.
          Based on IPCC AR6 and EPA eGRID 2023 reference values.
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: region
            tests:
              - not_null
          - name: fuel_type
            tests:
              - not_null
          - name: direct_co2_per_mwh
            description: Direct CO2 emissions in gCO2eq/kWh.
          - name: lifecycle_co2_per_mwh
            description: Lifecycle CO2 emissions in gCO2eq/kWh.
          - name: recorded_at
            tests:
              - not_null

      - name: enrichment_market_prices
        description: >
          Synthetic electricity market prices per grid region.
          Modelled on US wholesale LMP price distributions.
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: region
            tests:
              - not_null
          - name: spot_price_usd_mwh
            description: Real-time spot price in USD/MWh.
          - name: recorded_at
            tests:
              - not_null

      - name: enrichment_demand_forecast
        description: >
          Synthetic hourly electricity demand forecasts per grid region.
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: region
            tests:
              - not_null
          - name: forecast_hour
            tests:
              - not_null
          - name: forecast_demand_mw
            tests:
              - not_null
