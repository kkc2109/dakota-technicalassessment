version: 2

models:
  - name: bronze_eia_generation
    description: >
      Bronze view over raw.eia_electricity_generation. Provides a stable dbt-managed
      reference to EIA electricity generation data ingested from the EIA API v2.
      No transformations applied — data is as received from the source.
    columns:
      - name: id
        description: Raw table surrogate key.
        tests:
          - not_null
      - name: period
        description: "EIA reporting period (YYYY-MM)."
        tests:
          - not_null
      - name: state_code
        tests:
          - not_null
      - name: fuel_type_code
        tests:
          - not_null

  - name: bronze_eia_prices
    description: >
      Bronze view over raw.eia_electricity_prices. EIA retail electricity price data
      by sector and state as received from the API.
    columns:
      - name: id
        tests:
          - not_null
      - name: period
        tests:
          - not_null
      - name: state_code
        tests:
          - not_null

  - name: bronze_weather
    description: >
      Bronze view over raw.enrichment_weather. Synthetic weather conditions
      generated by the Dakota enrichment API service.
    columns:
      - name: id
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: recorded_at
        tests:
          - not_null

  - name: bronze_carbon_intensity
    description: >
      Bronze view over raw.enrichment_carbon_intensity. Synthetic carbon
      intensity data per fuel type and grid region.
    columns:
      - name: id
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: fuel_type
        tests:
          - not_null

  - name: bronze_market_prices
    description: >
      Bronze view over raw.enrichment_market_prices. Synthetic electricity
      market price data per grid region.
    columns:
      - name: id
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: recorded_at
        tests:
          - not_null
